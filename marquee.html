<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marquee</title>
</head>
<body>
    <marquee  bgcolor="FFCC00">Hello World1</marquee>
    <!-- marquee with behaviour -->
    <marquee behavior="scroll" bgcolor="FFFF00">Hello World2</marquee>
    <marquee behavior="slide" bgcolor="FFFFCC">Hello World3</marquee>
    <marquee behavior="alternate" bgcolor="FFFF99">Hello World4</marquee>
<!-- marquee with scrollamount -->
<marquee behavior="scroll" scrollamount="5" bgcolor="CCFFCC">Hello World5</marquee>
<marquee behavior="slide"scrollamount="10" bgcolor="99FF99">Hello World6</marquee>
<marquee behavior="alternate"scrollamount="2" bgcolor="66FF66">Hello World7</marquee>
<!-- marquee with direction -->
<marquee behavior="scroll" scrollamount="5" direction="left" bgcolor="00FF00">Hello World8</marquee>
<marquee behavior="slide"scrollamount="10"direction="right" bgcolor="66FFCC">Hello World9</marquee>
<marquee behavior="alternate"scrollamount="2" direction="up" bgcolor="66CCCC">Hello World10</marquee>
<marquee behavior="scroll" scrollamount="8" direction="down" bgcolor="00CCCC">Hello World11</marquee>
<!-- marquee with loop -->
<marquee scrollamount="6" loop="3" bgcolor="009999" height="50%" width="50%">Hello World12</marquee>
</body>
</html>
