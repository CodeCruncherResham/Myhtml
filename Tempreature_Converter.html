<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: radial-gradient(circle, rgba(247, 235, 250, 1) 0%, rgba(191, 226, 247, 1) 100%);
        }

        .converter {
            text-align: center;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
            width: 80%;
            max-width: 400px;
        }

        h1 {
            color: #2980b9;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }

        .input-group input,
        .input-group select {
            width: calc(100% - 12px);
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
            color: #333;
            background-color: #f9f9f9;
        }

        .output {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            background-color: #f0f0f0;
            padding: 10px;
            border-radius: 5px;
            color: #333;
        }

        .convert-btn {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .convert-btn:hover {
            background-color: #2980b9;
        }
    </style>
</head>

<body>

    <div class="converter">
        <h1>Temperature Converter</h1>

        <div class="input-group">
            <label for="inputTemp">Enter Temperature:</label>
            <input type="number" id="inputTemp" placeholder="Enter temperature..." step="any" required>
        </div>

        <div class="input-group">
            <label for="fromUnit">From:</label>
            <select id="fromUnit">
                <option value="celsius">Celsius (°C)</option>
                <option value="fahrenheit">Fahrenheit (°F)</option>
                <option value="kelvin">Kelvin (K)</option>
            </select>
        </div>

        <div class="input-group">
            <label for="toUnit">To:</label>
            <select id="toUnit">
                <option value="celsius">Celsius (°C)</option>
                <option value="fahrenheit">Fahrenheit (°F)</option>
                <option value="kelvin">Kelvin (K)</option>
            </select>
        </div>

        <button class="convert-btn" onclick="convertTemperature()">Convert</button>

        <div class="output" id="outputResult"></div>
    </div>

    <script>
        function convertTemperature() {
            // Get input values
            var inputTemp = parseFloat(document.getElementById('inputTemp').value);
            var fromUnit = document.getElementById('fromUnit').value;
            var toUnit = document.getElementById('toUnit').value;

            // Perform conversion
            var convertedTemp;
            if (fromUnit === "celsius" && toUnit === "fahrenheit") {
                convertedTemp = (inputTemp * 9/5) + 32;
            } else if (fromUnit === "celsius" && toUnit === "kelvin") {
                convertedTemp = inputTemp + 273.15;
            } else if (fromUnit === "fahrenheit" && toUnit === "celsius") {
                convertedTemp = (inputTemp - 32) * 5/9;
            } else if (fromUnit === "fahrenheit" && toUnit === "kelvin") {
                convertedTemp = (inputTemp - 32) * 5/9 + 273.15;
            } else if (fromUnit === "kelvin" && toUnit === "celsius") {
                convertedTemp = inputTemp - 273.15;
            } else if (fromUnit === "kelvin" && toUnit === "fahrenheit") {
                convertedTemp = (inputTemp - 273.15) * 9/5 + 32;
            } else {
                convertedTemp = inputTemp; // Same unit conversion
            }

            // Display result
            document.getElementById('outputResult').innerHTML = inputTemp.toFixed(2) + ' ' + fromUnit.toUpperCase() + ' = ' + convertedTemp.toFixed(2) + ' ' + toUnit.toUpperCase();
        }
    </script>

</body>

</html>
